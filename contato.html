<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contato</title>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #3a1b5a, #6a3fa0, #b18ae0);
      color: #F1ECF8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    nav {
      position: sticky;
      top: 0;
      background-color: #3A1B5A;
      padding: 0.8rem 1rem;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    nav .logo-nav {
      font-family: 'EB Garamond', serif;
      font-size: 2rem;
      color: #C9A24D;
      letter-spacing: 1px;
      margin-left: 0.5rem;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      transition: max-height 0.3s ease;
    }

    nav ul li a {
      color: #E6D8A8;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
    }

    nav ul li a:hover {
      color: #F5EBCB;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: #E6D8A8;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 4rem 1rem 3rem;
    }

    header h1 {
      font-family: 'EB Garamond', serif;
      font-size: 4rem;
      letter-spacing: 3px;
      color: #C9A24D;
      text-transform: uppercase;
    }

    header h2 {
      font-family: 'EB Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #E6D8A8;
      margin-top: 0.6rem;
    }

    /* MAIN */
    main {
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 0 1.5rem;
      flex: 1;
    }

    .loc-quote {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.06);
      padding: 2rem;
      box-shadow: 0 0 12px rgba(0,0,0,0.25);
      border-radius: 4px;
    }

    label {
      display: block;
      margin-bottom: 1.2rem;
    }

    input, textarea {
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.6rem;
      font-family: 'Inter', sans-serif;
      border-radius: 4px;
      border: none;
    }

    button {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.7rem 1.6rem;
      font-weight: 700;
      background-color: #C9A24D;
      color: #3A1B5A;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      nav .logo-nav {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 600px) {
      nav ul {
        flex-direction: column;
        width: 100%;
        max-height: 0;
        overflow: hidden;
        margin-top: 0.5rem;
      }

      nav ul.show {
        max-height: 500px;
      }

      .hamburger {
        display: flex;
      }

      header h1 {
        font-size: 2rem;
        letter-spacing: 2px;
      }

      header h2 {
        font-size: 1.15rem;
      }
    }
  </style>
</head>

<body>

<nav>
  <div class="logo-nav">Cristo Operário</div>

  <div class="hamburger" id="hamburger">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <ul id="nav-links">
    <li><a href="sobrenos.html">Sobre nós</a></li>
    <li><a href="regra.html">Regra</a></li>
    <li><a href="loc.html">LOC</a></li>
    <li><a href="catecismo.html">Catecismo</a></li>
    <li><a href="postagens.html">Postagens</a></li>
    <li><a href="documentos.html">Documentos</a></li>
    <li><a href="inicio.html">Início</a></li>
  </ul>
</nav>

<header>
  <h1>Contato</h1>
  <h2>Fale conosco</h2>
</header>

<main>
  <blockquote class="loc-quote">

    <form action="https://formsubmit.co/cristooperario26@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="Nova mensagem pelo site">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://irmadel.github.io/sociedadecristooperario/contato.html">

      <label>
        Nome
        <input type="text" name="nome" required>
      </label>

      <label>
        Email
        <input type="email" name="email" required>
      </label>

      <label>
        Telefone (opcional)
        <input type="tel" name="telefone">
      </label>

      <label>
        Assunto
        <input type="text" name="assunto" required>
      </label>

      <label>
        Mensagem
        <textarea name="mensagem" rows="6" required></textarea>
      </label>

      <button type="submit">Enviar mensagem</button>
    </form>

  </blockquote>
</main>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');

  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('show');
  });
</script>

</body>
</html>
